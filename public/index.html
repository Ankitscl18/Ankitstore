<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ankit Store - Admin Panel</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #1A3C2E 0%, #2D5F3F 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            background: white;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 {
            color: #1A3C2E;
            font-size: 32px;
        }
        .header p {
            color: #666;
            font-size: 14px;
        }
        .tabs {
            display: flex;
            gap: 10px;
        }
        .tab-btn {
            padding: 12px 24px;
            border: none;
            background: #E5E5E5;
            color: #666;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            font-size: 15px;
            transition: all 0.3s;
        }
        .tab-btn.active {
            background: #F8CB46;
            color: #1A3C2E;
        }
        .tab-btn:hover {
            transform: translateY(-2px);
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .card h2 {
            color: #1A3C2E;
            font-size: 22px;
            margin-bottom: 20px;
            border-bottom: 3px solid #F8CB46;
            padding-bottom: 10px;
        }
        .form-group { margin-bottom: 20px; }
        label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }
        input[type="text"], input[type="number"], select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #E5E5E5;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.3s;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #F8CB46;
        }
        .image-upload {
            border: 3px dashed #DDD;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #FAFAFA;
        }
        .image-upload:hover {
            border-color: #F8CB46;
            background: #FFF9E6;
        }
        .image-upload.has-image {
            padding: 0;
            border: 2px solid #F8CB46;
        }
        #imagePreview {
            max-width: 100%;
            max-height: 300px;
            border-radius: 10px;
            display: none;
        }
        .upload-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }
        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
        }
        .btn-primary {
            background: #F8CB46;
            color: #1A3C2E;
        }
        .btn-primary:hover {
            background: #E6B930;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(248,203,70,0.3);
        }
        .btn-primary:disabled {
            background: #CCC;
            cursor: not-allowed;
            transform: none;
        }
        .products-list, .orders-list {
            max-height: 600px;
            overflow-y: auto;
        }
        .product-item {
            display: flex;
            gap: 15px;
            padding: 15px;
            border: 2px solid #F0F0F0;
            border-radius: 10px;
            margin-bottom: 15px;
            align-items: center;
            transition: all 0.3s;
        }
        .product-item:hover {
            border-color: #F8CB46;
            box-shadow: 0 3px 10px rgba(0,0,0,0.05);
        }
        .product-img {
            width: 80px;
            height: 80px;
            object-fit: contain;
            border-radius: 8px;
            background: #FAFAFA;
            padding: 5px;
        }
        .product-info { flex: 1; }
        .product-name {
            font-weight: 700;
            color: #1A3C2E;
            font-size: 16px;
            margin-bottom: 5px;
        }
        .product-brand {
            color: #279F5E;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 3px;
        }
        .product-meta {
            color: #999;
            font-size: 13px;
        }
        .product-actions {
            display: flex;
            gap: 10px;
        }
        .btn-sm {
            padding: 8px 15px;
            font-size: 13px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-weight: 600;
        }
        .btn-delete {
            background: #FF3E3E;
            color: white;
        }
        .btn-delete:hover { background: #E63535; }
        .status {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        .status.success {
            background: #E8F5E9;
            color: #279F5E;
            border: 2px solid #279F5E;
        }
        .status.error {
            background: #FFEBEE;
            color: #D32F2F;
            border: 2px solid #D32F2F;
        }
        .loading {
            text-align: center;
            padding: 20px;
            color: #999;
        }
        
        /* Orders Styles */
        .order-card {
            border: 2px solid #F0F0F0;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            background: #FAFAFA;
        }
        .order-card:hover {
            border-color: #F8CB46;
        }
        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 2px solid #E5E5E5;
        }
        .order-id {
            font-size: 18px;
            font-weight: 800;
            color: #1A3C2E;
        }
        .order-date {
            font-size: 13px;
            color: #999;
            margin-top: 3px;
        }
        .status-badge {
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 700;
        }
        .status-pending { background: #FFF3E0; color: #FF8C00; }
        .status-confirmed { background: #E3F2FD; color: #1976D2; }
        .status-delivered { background: #E8F5E9; color: #279F5E; }
        .order-customer {
            margin-bottom: 15px;
            padding: 12px;
            background: white;
            border-radius: 8px;
        }
        .customer-name {
            font-weight: 700;
            color: #1A3C2E;
            margin-bottom: 5px;
        }
        .customer-phone {
            color: #279F5E;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 5px;
        }
        .customer-address {
            color: #666;
            font-size: 13px;
            line-height: 1.5;
        }
        .order-items {
            margin-bottom: 15px;
        }
        .order-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 12px;
            background: white;
            border-radius: 6px;
            margin-bottom: 8px;
        }
        .item-name {
            font-weight: 600;
            color: #333;
        }
        .item-qty {
            color: #999;
            font-size: 13px;
        }
        .item-price {
            font-weight: 700;
            color: #1A3C2E;
        }
        .order-total {
            display: flex;
            justify-content: space-between;
            padding: 12px;
            background: #1A3C2E;
            color: white;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .total-label {
            font-weight: 600;
        }
        .total-value {
            font-size: 20px;
            font-weight: 900;
        }
        .status-update {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .status-select {
            flex: 1;
            padding: 10px;
            border: 2px solid #E5E5E5;
            border-radius: 8px;
            font-weight: 600;
        }
        .btn-update {
            padding: 10px 20px;
            background: #279F5E;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
        }
        .btn-update:hover {
            background: #1F7A47;
        }
        @media (max-width: 768px) {
            .main-grid { grid-template-columns: 1fr; }
            .tabs { flex-wrap: wrap; }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Header -->
    <div class="header">
        <div>
            <h1>🛒 Ankit Store - Admin Panel</h1>
            <p>Manage products and orders</p>
        </div>
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('products')">📦 Products</button>
            <button class="tab-btn" onclick="switchTab('orders')">📋 Orders</button>
        </div>
    </div>

    <!-- PRODUCTS TAB -->
    <div id="productsTab" class="tab-content active">
        <div class="main-grid">
            <!-- Left: Add Product -->
            <div class="card">
                <h2>➕ Add New Product</h2>
                
                <div id="statusMessage" class="status"></div>

                <form id="productForm">
                    <div class="form-group">
                        <label>Product Image *</label>
                        <div class="image-upload" id="imageUploadArea" onclick="document.getElementById('imageInput').click()">
                            <div id="uploadPlaceholder">
                                <div class="upload-icon">📷</div>
                                <p style="color: #666; font-weight: 600;">Click to select image</p>
                                <p style="color: #999; font-size: 13px; margin-top: 5px;">JPG, PNG (max 5MB)</p>
                            </div>
                            <img id="imagePreview" alt="Preview">
                        </div>
                        <input type="file" id="imageInput" accept="image/*" style="display: none;" required>
                    </div>

                    <div class="form-group">
                        <label>Product Name *</label>
                        <input type="text" id="productName" placeholder="e.g., India Gate Basmati Rice" required>
                    </div>

                    <div class="form-group">
                        <label>Brand *</label>
                        <input type="text" id="productBrand" placeholder="e.g., India Gate" required>
                    </div>

                    <div class="form-group">
                        <label>Category *</label>
                        <select id="productCategory" required>
                            <option value="">Select Category</option>
                            <option value="Rice & Grains">Rice & Grains</option>
                            <option value="Dal & Pulses">Dal & Pulses</option>
                            <option value="Dairy">Dairy</option>
                            <option value="Vegetables">Vegetables</option>
                            <option value="Fruits">Fruits</option>
                            <option value="Atta & Flour">Atta & Flour</option>
                            <option value="Oils">Oils</option>
                            <option value="Spices">Spices</option>
                            <option value="Bakery">Bakery</option>
                            <option value="Snacks">Snacks</option>
                        </select>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                        <div class="form-group">
                            <label>Price (₹) *</label>
                            <input type="number" id="productPrice" placeholder="120" min="1" required>
                        </div>
                        <div class="form-group">
                            <label>Stock *</label>
                            <input type="number" id="productStock" placeholder="50" min="0" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Weight/Size *</label>
                        <input type="text" id="productWeight" placeholder="e.g., 1 kg, 500 g" required>
                    </div>

                    <div class="form-group">
                        <label>Original Price (₹) - Optional</label>
                        <input type="number" id="productOriginalPrice" placeholder="150" min="1">
                    </div>

                    <div class="form-group">
                        <label>Badge - Optional</label>
                        <select id="productBadge">
                            <option value="">No Badge</option>
                            <option value="BESTSELLER">BESTSELLER</option>
                            <option value="SALE">SALE</option>
                            <option value="FRESH">FRESH</option>
                            <option value="POPULAR">POPULAR</option>
                            <option value="ORGANIC">ORGANIC</option>
                            <option value="NEW">NEW</option>
                        </select>
                    </div>

                    <button type="submit" class="btn btn-primary" id="submitBtn">💾 Save Product</button>
                </form>
            </div>

            <!-- Right: Products List -->
            <div class="card">
                <h2>📦 All Products</h2>
                <div id="productsList" class="products-list">
                    <div class="loading">Loading products...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- ORDERS TAB -->
    <div id="ordersTab" class="tab-content">
        <div class="card" style="max-width: 100%;">
            <h2>📋 Customer Orders</h2>
            <div id="ordersList" class="orders-list">
                <div class="loading">Loading orders...</div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
    import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc, serverTimestamp, query, orderBy } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';
    import { getStorage, ref, uploadBytes, getDownloadURL } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js';

    const firebaseConfig = {
        apiKey: "AIzaSyCr_IqY8bb0U5noZ7srDkvOWxjnshnvx-k",
        authDomain: "ankitstore-487e7.firebaseapp.com",
        projectId: "ankitstore-487e7",
        storageBucket: "ankitstore-487e7.firebasestorage.app",
        messagingSenderId: "78955712918",
        appId: "1:78955712918:web:bead19a3e3b03b56f38db7"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const storage = getStorage(app);

    let selectedImage = null;

    // Tab Switching
    window.switchTab = function(tab) {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
        
        if (tab === 'products') {
            document.querySelector('[onclick="switchTab(\'products\')"]').classList.add('active');
            document.getElementById('productsTab').classList.add('active');
        } else {
            document.querySelector('[onclick="switchTab(\'orders\')"]').classList.add('active');
            document.getElementById('ordersTab').classList.add('active');
            loadOrders();
        }
    };

    // Image Preview
    document.getElementById('imageInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            if (file.size > 5 * 1024 * 1024) {
                showStatus('Image too large! Max 5MB', 'error');
                return;
            }
            selectedImage = file;
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('imagePreview').src = e.target.result;
                document.getElementById('imagePreview').style.display = 'block';
                document.getElementById('uploadPlaceholder').style.display = 'none';
                document.getElementById('imageUploadArea').classList.add('has-image');
            };
            reader.readAsDataURL(file);
        }
    });

    // Submit Product Form
    document.getElementById('productForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        if (!selectedImage) {
            showStatus('Please select an image!', 'error');
            return;
        }

        const submitBtn = document.getElementById('submitBtn');
        submitBtn.disabled = true;
        submitBtn.textContent = '⏳ Uploading...';

        try {
            const timestamp = Date.now();
            const imageName = `products/${timestamp}_${selectedImage.name}`;
            const storageRef = ref(storage, imageName);
            await uploadBytes(storageRef, selectedImage);
            const imageUrl = await getDownloadURL(storageRef);

            const productsSnap = await getDocs(collection(db, 'products'));
            const nextId = productsSnap.size + 1;

            const productData = {
                id: nextId,
                name: document.getElementById('productName').value,
                brand: document.getElementById('productBrand').value,
                category: document.getElementById('productCategory').value,
                price: parseInt(document.getElementById('productPrice').value),
                stock: parseInt(document.getElementById('productStock').value),
                weight: document.getElementById('productWeight').value,
                imageUrl: imageUrl,
                createdAt: serverTimestamp()
            };

            const originalPrice = document.getElementById('productOriginalPrice').value;
            if (originalPrice) productData.originalPrice = parseInt(originalPrice);

            const badge = document.getElementById('productBadge').value;
            if (badge) productData.badge = badge;

            await addDoc(collection(db, 'products'), productData);

            showStatus('✅ Product added successfully!', 'success');
            document.getElementById('productForm').reset();
            document.getElementById('imagePreview').style.display = 'none';
            document.getElementById('uploadPlaceholder').style.display = 'block';
            document.getElementById('imageUploadArea').classList.remove('has-image');
            selectedImage = null;

            loadProducts();

        } catch (error) {
            console.error('Error:', error);
            showStatus('❌ Error: ' + error.message, 'error');
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = '💾 Save Product';
        }
    });

    // Load Products
    async function loadProducts() {
        const productsList = document.getElementById('productsList');
        productsList.innerHTML = '<div class="loading">Loading products...</div>';

        try {
            const querySnapshot = await getDocs(collection(db, 'products'));
            
            if (querySnapshot.empty) {
                productsList.innerHTML = '<div class="loading">No products yet. Add your first product!</div>';
                return;
            }

            let html = '';
            querySnapshot.forEach((doc) => {
                const product = doc.data();
                html += `
                    <div class="product-item">
                        <img src="${product.imageUrl}" class="product-img" alt="${product.name}">
                        <div class="product-info">
                            <div class="product-name">${product.name}</div>
                            <div class="product-brand">${product.brand} · ${product.weight}</div>
                            <div class="product-meta">₹${product.price} · Stock: ${product.stock} · ${product.category}</div>
                        </div>
                        <div class="product-actions">
                            <button class="btn-sm btn-delete" onclick="deleteProduct('${doc.id}')">🗑️ Delete</button>
                        </div>
                    </div>
                `;
            });
            productsList.innerHTML = html;

        } catch (error) {
            console.error('Error loading products:', error);
            productsList.innerHTML = '<div class="loading" style="color: red;">Error loading products</div>';
        }
    }

    // Delete Product
    window.deleteProduct = async function(docId) {
        if (!confirm('Are you sure you want to delete this product?')) return;

        try {
            await deleteDoc(doc(db, 'products', docId));
            showStatus('✅ Product deleted!', 'success');
            loadProducts();
        } catch (error) {
            showStatus('❌ Error deleting: ' + error.message, 'error');
        }
    };

    // Load Orders
    async function loadOrders() {
        const ordersList = document.getElementById('ordersList');
        ordersList.innerHTML = '<div class="loading">Loading orders...</div>';

        try {
            const querySnapshot = await getDocs(collection(db, 'orders'));
            
            if (querySnapshot.empty) {
                ordersList.innerHTML = '<div class="loading">No orders yet.</div>';
                return;
            }

            const orders = [];
            querySnapshot.forEach((doc) => {
                orders.push({ id: doc.id, ...doc.data() });
            });

            // Sort by date (newest first)
            orders.sort((a, b) => new Date(b.orderDate) - new Date(a.orderDate));

            let html = '';
            orders.forEach((order) => {
                const statusClass = order.orderStatus.toLowerCase().replace(' ', '-');
                const date = new Date(order.orderDate).toLocaleString('en-IN');
                
                html += `
                    <div class="order-card">
                        <div class="order-header">
                            <div>
                                <div class="order-id">Order #${order.id.substring(0, 8).toUpperCase()}</div>
                                <div class="order-date">🕐 ${date}</div>
                            </div>
                            <div class="status-badge status-${statusClass}">${order.orderStatus}</div>
                        </div>

                        <div class="order-customer">
                            <div class="customer-name">👤 ${order.userName}</div>
                            <div class="customer-phone">📱 +91 ${order.userPhone}</div>
                            <div class="customer-address">📍 ${order.deliveryAddress}</div>
                        </div>

                        <div class="order-items">
                            ${order.items.map(item => `
                                <div class="order-item">
                                    <div>
                                        <div class="item-name">${item.name}</div>
                                        <div class="item-qty">Qty: ${item.quantity} × ₹${item.price}</div>
                                    </div>
                                    <div class="item-price">₹${item.price * item.quantity}</div>
                                </div>
                            `).join('')}
                        </div>

                        <div class="order-total">
                            <div class="total-label">Total Amount (incl. delivery)</div>
                            <div class="total-value">₹${order.total}</div>
                        </div>

                        <div style="background: white; padding: 12px; border-radius: 8px; margin-bottom: 15px;">
                            <div style="font-weight: 600; color: #333; margin-bottom: 5px;">💳 ${order.paymentMethod}</div>
                            <div style="color: ${order.paymentStatus === 'Paid' ? '#279F5E' : '#FF8C00'}; font-weight: 700;">
                                ${order.paymentStatus === 'Paid' ? '✅ Paid' : '⏳ ' + order.paymentStatus}
                            </div>
                        </div>

                        <div class="status-update">
                            <select class="status-select" id="status_${order.id}">
                                <option value="Pending" ${order.orderStatus === 'Pending' ? 'selected' : ''}>Pending</option>
                                <option value="Confirmed" ${order.orderStatus === 'Confirmed' ? 'selected' : ''}>Confirmed</option>
                                <option value="Out for Delivery" ${order.orderStatus === 'Out for Delivery' ? 'selected' : ''}>Out for Delivery</option>
                                <option value="Delivered" ${order.orderStatus === 'Delivered' ? 'selected' : ''}>Delivered</option>
                                <option value="Cancelled" ${order.orderStatus === 'Cancelled' ? 'selected' : ''}>Cancelled</option>
                            </select>
                            <button class="btn-update" onclick="updateOrderStatus('${order.id}')">Update Status</button>
                        </div>
                    </div>
                `;
            });
            ordersList.innerHTML = html;

        } catch (error) {
            console.error('Error loading orders:', error);
            ordersList.innerHTML = '<div class="loading" style="color: red;">Error loading orders</div>';
        }
    }

    // Update Order Status
    window.updateOrderStatus = async function(orderId) {
        const newStatus = document.getElementById('status_' + orderId).value;
        
        try {
            await updateDoc(doc(db, 'orders', orderId), {
                orderStatus: newStatus
            });
            
            alert('✅ Order status updated to: ' + newStatus);
            loadOrders();
            
        } catch (error) {
            alert('❌ Error updating status: ' + error.message);
        }
    };

    // Show Status Message
    function showStatus(message, type) {
        const statusEl = document.getElementById('statusMessage');
        statusEl.textContent = message;
        statusEl.className = 'status ' + type;
        statusEl.style.display = 'block';
        setTimeout(() => {
            statusEl.style.display = 'none';
        }, 5000);
    }

    // Load products on page load
    loadProducts();
</script>

</body>
</html>
