<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ankit Store - Admin Panel</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #1A3C2E 0%, #2D5F3F 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            background: white; padding: 25px; border-radius: 15px;
            margin-bottom: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex; justify-content: space-between; align-items: center;
        }
        .header h1 { color: #1A3C2E; font-size: 32px; }
        .header p { color: #666; font-size: 14px; }
        .tabs { display: flex; gap: 10px; }
        .tab-btn {
            padding: 12px 24px; border: none; background: #E5E5E5; color: #666;
            border-radius: 10px; cursor: pointer; font-weight: 700; font-size: 15px; transition: all 0.3s;
        }
        .tab-btn.active { background: #F8CB46; color: #1A3C2E; }
        .tab-btn:hover { transform: translateY(-2px); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .card h2 { color: #1A3C2E; font-size: 22px; margin-bottom: 20px; border-bottom: 3px solid #F8CB46; padding-bottom: 10px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; color: #333; font-weight: 600; margin-bottom: 8px; font-size: 14px; }
        input[type="text"], input[type="number"], select {
            width: 100%; padding: 12px; border: 2px solid #E5E5E5;
            border-radius: 8px; font-size: 15px; transition: all 0.3s; font-family: inherit;
        }
        input:focus, select:focus { outline: none; border-color: #F8CB46; }
        .image-upload {
            border: 3px dashed #DDD; border-radius: 12px; padding: 40px;
            text-align: center; cursor: pointer; transition: all 0.3s; background: #FAFAFA;
        }
        .image-upload:hover { border-color: #F8CB46; background: #FFF9E6; }
        .image-upload.has-image { padding: 0; border: 2px solid #F8CB46; }
        #imagePreview { max-width: 100%; max-height: 300px; border-radius: 10px; display: none; }
        .upload-icon { font-size: 48px; margin-bottom: 10px; }
        .btn { padding: 15px 30px; border: none; border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.3s; width: 100%; font-family: inherit; }
        .btn-primary { background: #F8CB46; color: #1A3C2E; }
        .btn-primary:hover { background: #E6B930; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(248,203,70,0.3); }
        .btn-primary:disabled { background: #CCC; cursor: not-allowed; transform: none; }
        .products-list, .orders-list { max-height: 600px; overflow-y: auto; }
        .product-item { display: flex; gap: 15px; padding: 15px; border: 2px solid #F0F0F0; border-radius: 10px; margin-bottom: 15px; align-items: center; transition: all 0.3s; }
        .product-item:hover { border-color: #F8CB46; box-shadow: 0 3px 10px rgba(0,0,0,0.05); }
        .product-img { width: 80px; height: 80px; object-fit: contain; border-radius: 8px; background: #FAFAFA; padding: 5px; }
        .product-info { flex: 1; }
        .product-name { font-weight: 700; color: #1A3C2E; font-size: 16px; margin-bottom: 5px; }
        .product-brand { color: #279F5E; font-size: 13px; font-weight: 600; margin-bottom: 3px; }
        .product-meta { color: #999; font-size: 13px; }
        .btn-sm { padding: 8px 15px; font-size: 13px; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; font-family: inherit; }
        .btn-delete { background: #FF3E3E; color: white; }
        .btn-delete:hover { background: #E63535; }
        .status { padding: 15px; border-radius: 8px; margin-bottom: 20px; display: none; font-weight: 600; }
        .status.success { background: #E8F5E9; color: #279F5E; border: 2px solid #279F5E; }
        .status.error { background: #FFEBEE; color: #D32F2F; border: 2px solid #D32F2F; }
        .loading { text-align: center; padding: 20px; color: #999; }
        .order-card { border: 2px solid #F0F0F0; border-radius: 12px; padding: 20px; margin-bottom: 20px; background: #FAFAFA; }
        .order-card:hover { border-color: #F8CB46; }
        .order-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 2px solid #E5E5E5; }
        .order-id { font-size: 18px; font-weight: 800; color: #1A3C2E; }
        .order-date { font-size: 13px; color: #999; margin-top: 3px; }
        .status-badge { padding: 8px 16px; border-radius: 20px; font-size: 13px; font-weight: 700; }
        .status-pending { background: #FFF3E0; color: #FF8C00; }
        .status-confirmed { background: #E3F2FD; color: #1976D2; }
        .status-delivered { background: #E8F5E9; color: #279F5E; }
        .status-cancelled { background: #FFEBEE; color: #D32F2F; }
        .status-out-for-delivery { background: #E8EAF6; color: #3949AB; }
        .order-customer { margin-bottom: 15px; padding: 12px; background: white; border-radius: 8px; }
        .customer-name { font-weight: 700; color: #1A3C2E; margin-bottom: 5px; }
        .customer-phone { color: #279F5E; font-weight: 600; font-size: 14px; margin-bottom: 5px; }
        .customer-address { color: #666; font-size: 13px; line-height: 1.5; }
        .order-items { margin-bottom: 15px; }
        .order-item { display: flex; justify-content: space-between; padding: 8px 12px; background: white; border-radius: 6px; margin-bottom: 8px; }
        .item-name { font-weight: 600; color: #333; }
        .item-qty { color: #999; font-size: 13px; }
        .item-price { font-weight: 700; color: #1A3C2E; }
        .order-total { display: flex; justify-content: space-between; padding: 12px; background: #1A3C2E; color: white; border-radius: 8px; margin-bottom: 15px; }
        .total-label { font-weight: 600; }
        .total-value { font-size: 20px; font-weight: 900; }
        .status-update { display: flex; gap: 10px; align-items: center; }
        .status-select { flex: 1; padding: 10px; border: 2px solid #E5E5E5; border-radius: 8px; font-weight: 600; font-family: inherit; }
        .btn-update { padding: 10px 20px; background: #279F5E; color: white; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; font-family: inherit; }
        .btn-update:hover { background: #1F7A47; }
        @media (max-width: 768px) { .main-grid { grid-template-columns: 1fr; } .tabs { flex-wrap: wrap; } }
    </style>
</head>
<body>
<div class="container">

    <div class="header">
        <div>
            <h1>🛒 Ankit Store - Admin Panel</h1>
            <p>Manage products and orders</p>
        </div>
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('products')">📦 Products</button>
            <button class="tab-btn" onclick="switchTab('orders')">📋 Orders</button>
        </div>
    </div>

    <!-- PRODUCTS TAB -->
    <div id="productsTab" class="tab-content active">
        <div class="main-grid">
            <div class="card">
                <h2>➕ Add New Product</h2>
                <div id="statusMessage" class="status"></div>

                <div class="form-group">
                    <label>Product Image *</label>
                    <div class="image-upload" id="imageUploadArea" onclick="document.getElementById('imageInput').click()">
                        <div id="uploadPlaceholder">
                            <div class="upload-icon">📷</div>
                            <p style="color:#666;font-weight:600;">Click to select image</p>
                            <p style="color:#999;font-size:13px;margin-top:5px;">JPG, PNG (max 5MB)</p>
                        </div>
                        <img id="imagePreview" alt="Preview">
                    </div>
                    <input type="file" id="imageInput" accept="image/*" style="display:none;" required>
                </div>

                <div class="form-group">
                    <label>Product Name *</label>
                    <input type="text" id="productName" placeholder="e.g., India Gate Basmati Rice">
                </div>
                <div class="form-group">
                    <label>Brand *</label>
                    <input type="text" id="productBrand" placeholder="e.g., India Gate">
                </div>
                <div class="form-group">
                    <label>Category *</label>
                    <select id="productCategory">
                        <option value="">Select Category</option>
                        <option value="Rice & Grains">Rice &amp; Grains</option>
                        <option value="Dal & Pulses">Dal &amp; Pulses</option>
                        <option value="Dairy">Dairy</option>
                        <option value="Vegetables">Vegetables</option>
                        <option value="Fruits">Fruits</option>
                        <option value="Atta & Flour">Atta &amp; Flour</option>
                        <option value="Oils">Oils</option>
                        <option value="Spices">Spices</option>
                        <option value="Bakery">Bakery</option>
                        <option value="Snacks">Snacks</option>
                    </select>
                </div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:15px;">
                    <div class="form-group">
                        <label>Price (₹) *</label>
                        <input type="number" id="productPrice" placeholder="120" min="1">
                    </div>
                    <div class="form-group">
                        <label>Stock *</label>
                        <input type="number" id="productStock" placeholder="50" min="0">
                    </div>
                </div>
                <div class="form-group">
                    <label>Weight/Size *</label>
                    <input type="text" id="productWeight" placeholder="e.g., 1 kg, 500 g">
                </div>
                <div class="form-group">
                    <label>Original Price (₹) - Optional</label>
                    <input type="number" id="productOriginalPrice" placeholder="150" min="1">
                </div>
                <div class="form-group">
                    <label>Badge - Optional</label>
                    <select id="productBadge">
                        <option value="">No Badge</option>
                        <option value="BESTSELLER">BESTSELLER</option>
                        <option value="SALE">SALE</option>
                        <option value="FRESH">FRESH</option>
                        <option value="POPULAR">POPULAR</option>
                        <option value="ORGANIC">ORGANIC</option>
                        <option value="NEW">NEW</option>
                    </select>
                </div>
                <button class="btn btn-primary" id="submitBtn" onclick="submitProduct()">💾 Save Product</button>
            </div>

            <div class="card">
                <h2>📦 All Products</h2>
                <div id="productsList" class="products-list">
                    <div class="loading">Loading products...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- ORDERS TAB -->
    <div id="ordersTab" class="tab-content">
        <div class="card">
            <h2>📋 Customer Orders</h2>
            <div id="ordersList" class="orders-list">
                <div class="loading">Loading orders...</div>
            </div>
        </div>
    </div>

</div>

<script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
    import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';
    import { getStorage, ref, uploadBytes, getDownloadURL } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js';

    const firebaseConfig = {
        apiKey: "AIzaSyCxQR3UmWHDxQW3af6Z453RKMtEoztUlWk",
        authDomain: "ankitstore-new.firebaseapp.com",
        projectId: "ankitstore-new",
        storageBucket: "ankitstore-new.firebasestorage.app",
        messagingSenderId: "273863658271",
        appId: "1:273863658271:web:e33d233a3ed2ecea86fe2a"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const storage = getStorage(app);
    let selectedImage = null;

    // Tab Switching
    window.switchTab = function(tab) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        if (tab === 'products') {
            document.querySelector('[onclick="switchTab(\'products\')"]').classList.add('active');
            document.getElementById('productsTab').classList.add('active');
        } else {
            document.querySelector('[onclick="switchTab(\'orders\')"]').classList.add('active');
            document.getElementById('ordersTab').classList.add('active');
            loadOrders();
        }
    };

    // Image Preview
    document.getElementById('imageInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        if (file.size > 5 * 1024 * 1024) { showStatus('Image too large! Max 5MB', 'error'); return; }
        selectedImage = file;
        const reader = new FileReader();
        reader.onload = function(e) {
            document.getElementById('imagePreview').src = e.target.result;
            document.getElementById('imagePreview').style.display = 'block';
            document.getElementById('uploadPlaceholder').style.display = 'none';
            document.getElementById('imageUploadArea').classList.add('has-image');
        };
        reader.readAsDataURL(file);
    });

    // Submit Product
    window.submitProduct = async function() {
        const name     = document.getElementById('productName').value.trim();
        const brand    = document.getElementById('productBrand').value.trim();
        const category = document.getElementById('productCategory').value;
        const price    = document.getElementById('productPrice').value;
        const stock    = document.getElementById('productStock').value;
        const weight   = document.getElementById('productWeight').value.trim();

        if (!selectedImage) { showStatus('Please select a product image!', 'error'); return; }
        if (!name)     { showStatus('Please enter product name!', 'error'); return; }
        if (!brand)    { showStatus('Please enter brand!', 'error'); return; }
        if (!category) { showStatus('Please select a category!', 'error'); return; }
        if (!price)    { showStatus('Please enter price!', 'error'); return; }
        if (!stock)    { showStatus('Please enter stock!', 'error'); return; }
        if (!weight)   { showStatus('Please enter weight/size!', 'error'); return; }

        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.textContent = '⏳ Uploading...';

        try {
            // Upload image to Firebase Storage
            const timestamp = Date.now();
            const storageRef = ref(storage, `products/${timestamp}_${selectedImage.name}`);
            await uploadBytes(storageRef, selectedImage);
            const imageUrl = await getDownloadURL(storageRef);

            const snap = await getDocs(collection(db, 'products'));
            const productData = {
                id: snap.size + 1,
                name, brand, category,
                price: parseInt(price),
                stock: parseInt(stock),
                weight,
                imageUrl,
                createdAt: serverTimestamp()
            };

            const originalPrice = document.getElementById('productOriginalPrice').value;
            if (originalPrice) productData.originalPrice = parseInt(originalPrice);
            const badge = document.getElementById('productBadge').value;
            if (badge) productData.badge = badge;

            await addDoc(collection(db, 'products'), productData);
            showStatus('✅ Product added successfully!', 'success');
            resetForm();
            loadProducts();
        } catch (err) {
            console.error(err);
            showStatus('❌ Error: ' + err.message, 'error');
        } finally {
            btn.disabled = false;
            btn.textContent = '💾 Save Product';
        }
    };

    function resetForm() {
        ['productName','productBrand','productPrice','productStock','productWeight','productOriginalPrice'].forEach(id => document.getElementById(id).value = '');
        document.getElementById('productCategory').value = '';
        document.getElementById('productBadge').value = '';
        document.getElementById('imageInput').value = '';
        document.getElementById('imagePreview').style.display = 'none';
        document.getElementById('uploadPlaceholder').style.display = 'block';
        document.getElementById('imageUploadArea').classList.remove('has-image');
        selectedImage = null;
    }

    // Load Products
    async function loadProducts() {
        const list = document.getElementById('productsList');
        list.innerHTML = '<div class="loading">Loading products...</div>';
        try {
            const snap = await getDocs(collection(db, 'products'));
            if (snap.empty) { list.innerHTML = '<div class="loading">No products yet. Add your first product!</div>'; return; }
            let html = '';
            snap.forEach(d => {
                const p = d.data();
                html += `<div class="product-item">
                    <img src="${p.imageUrl}" class="product-img" alt="${p.name}">
                    <div class="product-info">
                        <div class="product-name">${p.name}</div>
                        <div class="product-brand">${p.brand} · ${p.weight}</div>
                        <div class="product-meta">₹${p.price} · Stock: ${p.stock} · ${p.category}</div>
                    </div>
                    <div><button class="btn-sm btn-delete" onclick="deleteProduct('${d.id}')">🗑️ Delete</button></div>
                </div>`;
            });
            list.innerHTML = html;
        } catch (err) { list.innerHTML = `<div class="loading" style="color:red;">Error: ${err.message}</div>`; }
    }

    // Delete Product
    window.deleteProduct = async function(docId) {
        if (!confirm('Delete this product?')) return;
        try {
            await deleteDoc(doc(db, 'products', docId));
            showStatus('✅ Product deleted!', 'success');
            loadProducts();
        } catch (err) { showStatus('❌ Error: ' + err.message, 'error'); }
    };

    // Load Orders
    async function loadOrders() {
        const list = document.getElementById('ordersList');
        list.innerHTML = '<div class="loading">Loading orders...</div>';
        try {
            const snap = await getDocs(collection(db, 'orders'));
            if (snap.empty) { list.innerHTML = '<div class="loading">No orders yet.</div>'; return; }
            const orders = [];
            snap.forEach(d => orders.push({ id: d.id, ...d.data() }));
            orders.sort((a, b) => new Date(b.orderDate) - new Date(a.orderDate));
            let html = '';
            orders.forEach(order => {
                const sc = (order.orderStatus || 'pending').toLowerCase().replace(/\s+/g, '-');
                const date = order.orderDate ? new Date(order.orderDate).toLocaleString('en-IN') : 'N/A';
                const items = Array.isArray(order.items) ? order.items : [];
                html += `<div class="order-card">
                    <div class="order-header">
                        <div>
                            <div class="order-id">Order #${order.id.substring(0,8).toUpperCase()}</div>
                            <div class="order-date">🕐 ${date}</div>
                        </div>
                        <div class="status-badge status-${sc}">${order.orderStatus || 'Pending'}</div>
                    </div>
                    <div class="order-customer">
                        <div class="customer-name">👤 ${order.userName || 'N/A'}</div>
                        <div class="customer-phone">📱 +91 ${order.userPhone || 'N/A'}</div>
                        <div class="customer-address">📍 ${order.deliveryAddress || 'N/A'}</div>
                    </div>
                    <div class="order-items">
                        ${items.map(item => `<div class="order-item">
                            <div><div class="item-name">${item.name}</div><div class="item-qty">Qty: ${item.quantity} × ₹${item.price}</div></div>
                            <div class="item-price">₹${item.price * item.quantity}</div>
                        </div>`).join('')}
                    </div>
                    <div class="order-total">
                        <div class="total-label">Total Amount (incl. delivery)</div>
                        <div class="total-value">₹${order.total || 0}</div>
                    </div>
                    <div style="background:white;padding:12px;border-radius:8px;margin-bottom:15px;">
                        <div style="font-weight:600;color:#333;margin-bottom:5px;">💳 ${order.paymentMethod || 'N/A'}</div>
                        <div style="color:${order.paymentStatus === 'Paid' ? '#279F5E' : '#FF8C00'};font-weight:700;">
                            ${order.paymentStatus === 'Paid' ? '✅ Paid' : '⏳ ' + (order.paymentStatus || 'Pending')}
                        </div>
                    </div>
                    <div class="status-update">
                        <select class="status-select" id="status_${order.id}">
                            <option value="Pending" ${order.orderStatus==='Pending'?'selected':''}>Pending</option>
                            <option value="Confirmed" ${order.orderStatus==='Confirmed'?'selected':''}>Confirmed</option>
                            <option value="Out for Delivery" ${order.orderStatus==='Out for Delivery'?'selected':''}>Out for Delivery</option>
                            <option value="Delivered" ${order.orderStatus==='Delivered'?'selected':''}>Delivered</option>
                            <option value="Cancelled" ${order.orderStatus==='Cancelled'?'selected':''}>Cancelled</option>
                        </select>
                        <button class="btn-update" onclick="updateOrderStatus('${order.id}')">Update</button>
                    </div>
                </div>`;
            });
            list.innerHTML = html;
        } catch (err) { list.innerHTML = `<div class="loading" style="color:red;">Error: ${err.message}</div>`; }
    }

    // Update Order Status
    window.updateOrderStatus = async function(orderId) {
        const newStatus = document.getElementById('status_' + orderId).value;
        try {
            await updateDoc(doc(db, 'orders', orderId), { orderStatus: newStatus });
            alert('✅ Status updated to: ' + newStatus);
            loadOrders();
        } catch (err) { alert('❌ Error: ' + err.message); }
    };

    function showStatus(msg, type) {
        const el = document.getElementById('statusMessage');
        el.textContent = msg;
        el.className = 'status ' + type;
        el.style.display = 'block';
        setTimeout(() => { el.style.display = 'none'; }, 5000);
    }

    loadProducts();
</script>
</body>
</html>
